name: Publish to PyPI

on:
  release:
    types: [published] # Triggers when a GitHub Release is published (create it from main)

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pycircdb
    permissions:
      id-token: write  # IMPORTANT: Mandatory for PyPI Trusted Publishing
      contents: read
      
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install build dependencies
        run: uv python install 3.14 && uv venv && uv pip install build

      - name: Build the project
        run: uv run python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
