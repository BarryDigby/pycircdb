name: Trigger Read the Docs Build

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.readthedocs.yaml'

jobs:
  trigger-rtd:
    name: Trigger Read the Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RTD build via API
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_TOKEN }}" \
            "https://readthedocs.org/api/v3/projects/pycircdb/versions/latest/builds/"
